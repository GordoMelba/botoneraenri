<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Catálogo Botonera Enri - Pedido por WhatsApp</title>

  <style>
    :root{
      --bg:#f6f7fb;
      --panel:#ffffff;
      --card:#ffffff;
      --muted:#6b7280;
      --text:#111827;
      --line:#e5e7eb;
      --accent:#2563eb;
      --accent2:#1d4ed8;
      --danger:#dc2626;

      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --shadowSoft: 0 6px 18px rgba(0,0,0,.06);

      --radius:18px;
      --radius2:14px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: var(--bg);
      color: var(--text);
    }
    a{color:inherit}
    .wrap{
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px;
    }

    header{
      display:flex;
      gap:12px;
      align-items:center;
      justify-content:space-between;
      padding: 14px 16px;
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadowSoft);
      position: sticky;
      top: 12px;
      z-index: 10;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 260px;
    }
    .logo{
      width:42px; height:42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #111827, #374151);
      box-shadow: var(--shadowSoft);
    }
    .brand h1{
      font-size: 16px;
      margin:0;
      line-height:1.1;
    }
    .brand small{
      display:block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .topControls{
      display:flex;
      align-items:center;
      gap:10px;
      flex: 1;
      justify-content:center;
    }
    .search{
      width: min(520px, 100%);
      display:flex;
      align-items:center;
      gap:10px;
      background: #f3f4f6;
      border:1px solid #e5e7eb;
      padding:10px 12px;
      border-radius: 14px;
    }
    .search input{
      border:0;
      outline:none;
      background: transparent;
      width:100%;
      font-size:14px;
    }

    .cartBtn{
      border:0;
      background: var(--accent);
      color:#fff;
      padding:10px 12px;
      border-radius: 14px;
      cursor:pointer;
      box-shadow: var(--shadowSoft);
      display:flex;
      gap:10px;
      align-items:center;
      white-space: nowrap;
    }
    .pill{
      background: rgba(255,255,255,.2);
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
    }

    .grid{
      display:grid;
      grid-template-columns: 280px 1fr;
      gap: 14px;
      margin-top: 14px;
    }
    @media (max-width: 980px){
      .grid{grid-template-columns: 1fr;}
      header{position:relative; top:auto;}
      .brand{min-width:auto}
      .topControls{justify-content:flex-start}
    }

    .sidebar{
      background: var(--panel);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadowSoft);
      padding: 12px;
      height: fit-content;
    }
    .sidebar h2{
      margin: 4px 0 10px 0;
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .2px;
    }
    .catList{
      display:flex;
      flex-direction:column;
      gap:6px;
      max-height: 70vh;
      overflow:auto;
      padding-right: 4px;
    }
    .catBtn{
      border:1px solid var(--line);
      background:#fff;
      padding: 10px 10px;
      border-radius: 12px;
      cursor:pointer;
      text-align:left;
      font-size: 14px;
      display:flex;
      justify-content:space-between;
      gap: 10px;
      align-items:center;
    }
    .catBtn.active{
      border-color: rgba(37,99,235,.35);
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
    }
    .catCount{color:var(--muted); font-size: 12px;}

    .main{
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    .sectionTitle{
      background: transparent;
      margin: 4px 2px 0;
      display:flex;
      justify-content:space-between;
      align-items: baseline;
      gap: 8px;
    }
    .sectionTitle h2{
      margin:0;
      font-size: 18px;
    }
    .sectionTitle .meta{
      color: var(--muted);
      font-size: 13px;
    }

    .cards{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (max-width: 1120px){ .cards{grid-template-columns: repeat(2, 1fr);} }
    @media (max-width: 620px){ .cards{grid-template-columns: 1fr;} }

    .card{
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadowSoft);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height: 340px;
    }

    .imgWrap{
      background: #fff;
      border-bottom: 1px solid var(--line);
      position: relative;
      padding: 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      height: 220px;
    }
    .imgWrap img{
      max-height: 200px;
      max-width: 100%;
      object-fit: contain;
      display:block;
      border-radius: 14px;
    }
    .carouselCtrls{
      position:absolute;
      inset: 10px;
      pointer-events:none;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    .carBtn{
      pointer-events:auto;
      border: 1px solid rgba(0,0,0,.08);
      background: rgba(255,255,255,.85);
      padding: 8px 10px;
      border-radius: 12px;
      cursor:pointer;
      box-shadow: var(--shadowSoft);
    }
    .carDots{
      position:absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      display:flex;
      gap:6px;
      background: rgba(255,255,255,.85);
      border:1px solid rgba(0,0,0,.06);
      padding: 6px 10px;
      border-radius: 999px;
      box-shadow: var(--shadowSoft);
    }
    .dot{
      width: 8px; height: 8px;
      border-radius: 999px;
      background: #d1d5db;
    }
    .dot.active{ background: #111827; }

    .cardBody{
      padding: 12px 12px 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
      flex: 1;
    }
    .pname{
      font-weight: 700;
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
    }
    .pdesc{
      margin:0;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.3;
      min-height: 32px;
    }

    .row{
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    select, input[type="number"], input[type="text"]{
      border:1px solid var(--line);
      background:#fff;
      border-radius: 12px;
      padding: 9px 10px;
      font-size: 13px;
      outline:none;
    }
    select:focus, input:focus{
      box-shadow: 0 0 0 4px rgba(37,99,235,.12);
      border-color: rgba(37,99,235,.35);
    }

    .badgeLine{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .price{
      color: #111827;
      font-weight: 700;
    }
    .stock{
      font-size: 12px;
      color: var(--muted);
    }
    .rule{
      font-size: 12px;
      color: var(--muted);
      line-height: 1.25;
    }

    .btnRow{
      display:flex;
      gap: 10px;
      margin-top: auto;
      align-items:center;
    }
    .btn{
      border:0;
      cursor:pointer;
      border-radius: 14px;
      padding: 10px 12px;
      font-weight: 700;
      font-size: 13px;
    }
    .btn.add{ background: #111827; color:#fff; }
    .btn.secondary{ background: #eef2ff; color: #1f2a55; border: 1px solid #dbeafe; }
    .btn.disabled{ opacity: .5; cursor:not-allowed; }
    .mini{
      font-size: 12px;
      color: var(--muted);
    }

    /* Drawer carrito */
    .drawerBg{
      position:fixed;
      inset:0;
      background: rgba(0,0,0,.35);
      display:none;
      z-index: 50;
    }
    .drawerBg.show{ display:block; }

    .drawer{
      position:fixed;
      top:0; right:0;
      width: min(520px, 100%);
      height: 100vh;
      background: #fff;
      border-left: 1px solid var(--line);
      box-shadow: var(--shadow);
      transform: translateX(100%);
      transition: transform .22s ease;
      z-index: 60;
      display:flex;
      flex-direction:column;
    }
    .drawer.show{ transform: translateX(0); }

    .dHead{
      padding: 14px;
      border-bottom: 1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 10px;
    }
    .dHead h3{ margin:0; font-size: 16px; }
    .xbtn{
      border:1px solid var(--line);
      background:#fff;
      border-radius: 12px;
      padding: 8px 10px;
      cursor:pointer;
    }
    .dBody{
      padding: 12px 14px;
      overflow:auto;
      flex:1;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .cartItem{
      border:1px solid var(--line);
      border-radius: 14px;
      padding: 10px;
      display:flex;
      gap: 10px;
      align-items:flex-start;
      justify-content:space-between;
    }
    .ciLeft{
      display:flex;
      flex-direction:column;
      gap: 4px;
      max-width: 78%;
    }
    .ciTitle{ font-weight: 800; font-size: 13px; }
    .ciMeta{ color: var(--muted); font-size: 12px; line-height: 1.25;}
    .ciRight{
      display:flex;
      gap: 6px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .qty{
      width: 90px;
    }
    .del{
      border:1px solid var(--line);
      background:#fff;
      border-radius: 12px;
      padding: 8px 10px;
      cursor:pointer;
      color: var(--danger);
      font-weight: 800;
    }

    .dFoot{
      border-top: 1px solid var(--line);
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
      background: #fff;
    }
    .footRow{
      display:flex;
      gap: 10px;
      align-items:center;
    }
    .footRow input{
      flex: 1;
    }
    .send{
      background: #10b981;
      color:#fff;
      border:0;
      border-radius: 14px;
      padding: 12px 14px;
      font-weight: 900;
      cursor:pointer;
    }
    .send:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(17,24,39,.92);
      color:#fff;
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: var(--shadowSoft);
      display:none;
      z-index: 80;
      font-size: 13px;
    }
    .toast.show{ display:block; }
  </style>
</head>

<body>
  <div class="wrap">

    <header>
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>Botonera Enri</h1>
          <small>Catálogo + pedido por WhatsApp</small>
        </div>
      </div>

      <div class="topControls">
        <div class="search">
          <span style="color:#6b7280;">🔎</span>
          <input id="searchInput" type="text" placeholder="Buscar producto, código, descripción, categoría..." />
        </div>
      </div>

      <button class="cartBtn" id="openCart">
        🛒 Carrito <span class="pill" id="cartCount">0</span>
      </button>
    </header>

    <div class="grid">
      <aside class="sidebar">
        <h2>Categorías</h2>
        <div class="catList" id="catList"></div>
      </aside>

      <main class="main">
        <div class="sectionTitle">
          <h2 id="sectionName">Cargando…</h2>
          <div class="meta" id="sectionMeta"></div>
        </div>
        <div class="cards" id="cards"></div>
      </main>
    </div>

  </div>

  <!-- Drawer Carrito -->
  <div class="drawerBg" id="drawerBg"></div>
  <div class="drawer" id="drawer">
    <div class="dHead">
      <h3>Tu pedido</h3>
      <button class="xbtn" id="closeCart">Cerrar ✕</button>
    </div>
    <div class="dBody">
      <div class="mini">Podés armar el carrito sin nombre. El nombre se pide al enviar.</div>
      <div id="cartItems"></div>
    </div>
    <div class="dFoot">
      <div class="footRow">
        <input id="clientName" type="text" placeholder="Nombre y apellido (obligatorio para enviar)" />
      </div>
      <div class="footRow" style="justify-content:space-between;">
        <div><strong id="totalLabel">Total:</strong> <span id="totalValue" class="price">$0</span></div>
        <button class="send" id="sendWA">Enviar por WhatsApp</button>
      </div>
      <div class="mini" id="waHint"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // =========================================================
    // CONFIG
    // =========================================================
    // ESTE ES TU CSV PUBLICADO (sigue igual, solo cambia contenido de la sheet)
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRNkhK7Xcfnr-YpU4Kgp6UqETtbdEOr4EZ7nf0u3fv4eFK4E1c0D_fyb6mJXJTOY7zDSr7rRcpepuTA/pub?output=csv";

    // Tu número (formato internacional sin +)
    const MI_NUMERO = "5491158390513";

    // =========================================================
    // STATE
    // =========================================================
    let rows = [];              // filas crudas
    let products = [];          // productos agregados
    let productsByCat = new Map();
    let categories = [];
    let activeCat = null;
    let searchTerm = "";

    // Carrito
    // item: {key, display, qty, unit, unitPrice, lineTotal, meta, rowRef}
    let cart = [];

    // =========================================================
    // HELPERS (CSV)
    // =========================================================
    function toast(msg){
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      setTimeout(()=> el.classList.remove("show"), 1800);
    }

    function normalize(s){
      return String(s ?? "").trim();
    }
    function normLower(s){
      return normalize(s).toLowerCase();
    }

    function parseNumberMaybe(v){
      const s = normalize(v).replace(/\./g,"").replace(",","."); // por si viene 1.200 o 1200,50
      const n = Number(s);
      return Number.isFinite(n) ? n : null;
    }

    function splitList(v){
      const s = normalize(v);
      if(!s) return [];
      return s.split(",").map(x=>x.trim()).filter(Boolean);
    }

    function csvParse(text){
      // Parser CSV robusto (comillas, comas, saltos)
      const out = [];
      let i=0, field="", row=[], inQuotes=false;

      function pushField(){
        row.push(field);
        field="";
      }
      function pushRow(){
        // Evitar filas vacías
        const allEmpty = row.every(c=>normalize(c)==="");
        if(!allEmpty) out.push(row);
        row=[];
      }

      while(i<text.length){
        const ch = text[i];

        if(inQuotes){
          if(ch === '"'){
            // Doble comilla escape
            if(text[i+1] === '"'){
              field += '"';
              i += 2;
              continue;
            }else{
              inQuotes = false;
              i++;
              continue;
            }
          }else{
            field += ch;
            i++;
            continue;
          }
        }else{
          if(ch === '"'){
            inQuotes = true;
            i++;
            continue;
          }
          if(ch === ","){
            pushField();
            i++;
            continue;
          }
          if(ch === "\r"){
            i++;
            continue;
          }
          if(ch === "\n"){
            pushField();
            pushRow();
            i++;
            continue;
          }
          field += ch;
          i++;
        }
      }
      pushField();
      pushRow();

      return out;
    }

    async function loadCSV(url){
      const res = await fetch(url, {cache:"no-store"});
      if(!res.ok) throw new Error("No se pudo cargar el CSV");
      const text = await res.text();
      const table = csvParse(text);
      if(table.length < 2) throw new Error("CSV vacío");
      const header = table[0].map(h => normLower(h));
      const data = table.slice(1);
      const mapped = data.map(r=>{
        const obj = {};
        header.forEach((h, idx)=> obj[h] = r[idx] ?? "");
        return obj;
      });
      return mapped;
    }

    // =========================================================
    // MODEL BUILD
    // =========================================================
    function buildProductsFromRows(allRows){
      // Normalizar cada row con nombres esperados
      const normRows = allRows.map(r=>{
        const categoria = normalize(r["categoria"]);
        const producto = normalize(r["producto"]);
        const descripcion_producto = normalize(r["descripcion_producto"]);
        const calidad = normalize(r["calidad"]);
        const codigo_base = normalize(r["codigo_base"]);
        const medida_cm = normalize(r["medida_cm"]);
        const color = normalize(r["color"]);
        const codigo_color = normalize(r["codigo_color"]);
        const precio_unitario = parseNumberMaybe(r["precio_unitario"]) ?? 0;
        const stock_disponible = parseNumberMaybe(r["stock_disponible"]);
        const unidad = normalize(r["unidad"]) || "u";
        const minimo = parseNumberMaybe(r["minimo"]) ?? 1;
        const regla_cantidad = normalize(r["regla_cantidad"]);
        const es_plastico = normalize(r["es_plastico"]);
        const carta_colores = normalize(r["carta_colores"]);
        const imagenes = normalize(r["imagenes"]);
        const color_modo = normLower(r["color_modo"]) || "fijo";
        const imagenes_por_color = normalize(r["imagenes_por_color"]);

        // clave fila (para encontrar exacto)
        const rowKey = [
          codigo_base || producto,
          calidad || "",
          medida_cm || "",
          color || ""
        ].join("||");

        return {
          categoria, producto, descripcion_producto,
          calidad, codigo_base, medida_cm, color, codigo_color,
          precio_unitario, stock_disponible,
          unidad, minimo, regla_cantidad,
          es_plastico, carta_colores,
          imagenes, color_modo, imagenes_por_color,
          _rowKey: rowKey
        };
      }).filter(r => r.categoria && r.producto);

      // Agregar en productos (un producto por categoria+producto+codigo_base)
      const map = new Map();

      for(const r of normRows){
        const pKey = [
          r.categoria,
          r.producto,
          r.codigo_base || ""
        ].join("||");

        if(!map.has(pKey)){
          map.set(pKey, {
            pKey,
            categoria: r.categoria,
            producto: r.producto,
            descripcion: r.descripcion_producto,
            codigo_base: r.codigo_base,
            // Defaults de imágenes (se toman de la primer fila)
            imagenes: r.imagenes,
            color_modo: r.color_modo || "fijo",
            imagenes_por_color: r.imagenes_por_color,
            carta_colores: r.carta_colores,
            // Opciones
            qualities: new Set(),
            sizes: new Set(),
            colors: new Set(),
            // filas
            rows: []
          });
        }

        const p = map.get(pKey);
        if(r.calidad) p.qualities.add(r.calidad);
        if(r.medida_cm) p.sizes.add(r.medida_cm);
        if(r.color) p.colors.add(r.color);

        // Si la fila trae carta/imágenes más completas, preferir (sin pisar si vacío)
        if(!p.carta_colores && r.carta_colores) p.carta_colores = r.carta_colores;
        if(!p.imagenes && r.imagenes) p.imagenes = r.imagenes;

        // Si alguno es dinámico, se respeta dinámico (prioridad)
        if(normLower(r.color_modo) === "dinamico") p.color_modo = "dinamico";
        if(!p.imagenes_por_color && r.imagenes_por_color) p.imagenes_por_color = r.imagenes_por_color;

        p.rows.push(r);
      }

      const arr = Array.from(map.values()).map(p=>{
        p.qualities = Array.from(p.qualities);
        p.sizes = Array.from(p.sizes);
        p.colors = Array.from(p.colors);
        return p;
      });

      // Orden simple
      arr.sort((a,b)=> (a.categoria+a.producto).localeCompare(b.categoria+b.producto,"es"));

      return {normRows, products: arr};
    }

    function buildCategoryIndex(products){
      const catMap = new Map();
      for(const p of products){
        if(!catMap.has(p.categoria)) catMap.set(p.categoria, []);
        catMap.get(p.categoria).push(p);
      }
      const cats = Array.from(catMap.keys()).sort((a,b)=> a.localeCompare(b,"es"));
      return {cats, catMap};
    }

    // =========================================================
    // IMÁGENES
    // =========================================================
    function parseImagesList(str){
      // admite:
      // - "img/a.png"
      // - "img/a.png, img/b.png"
      // - vacío => []
      return splitList(str);
    }

    function parseImagesPorColor(jsonStr){
      if(!normalize(jsonStr)) return null;
      try{
        const obj = JSON.parse(jsonStr);
        // valores pueden ser "img/a.png" o "img/a.png, img/b.png"
        return obj;
      }catch(e){
        console.warn("imagenes_por_color inválido JSON:", e);
        return null;
      }
    }

    function getImagesForSelection(product, selectedColor){
      // 1) si dinámico y hay mapa por color => devolver lista correspondiente
      if(product.color_modo === "dinamico"){
        const map = parseImagesPorColor(product.imagenes_por_color);
        if(map && selectedColor && map[selectedColor]){
          const v = map[selectedColor];
          const list = parseImagesList(v);
          if(list.length) return list;
        }
      }
      // 2) fallback a imagenes base
      const base = parseImagesList(product.imagenes);
      if(base.length) return base;

      // 3) fallback final (placeholder)
      return ["data:image/svg+xml;charset=utf-8," + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="900" height="900">
          <rect width="100%" height="100%" fill="#f3f4f6"/>
          <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#6b7280" font-family="Arial" font-size="28">
            Sin imagen
          </text>
        </svg>
      `)];
    }

    // =========================================================
    // REGLAS DE CANTIDAD
    // =========================================================
    function extractStepFromRule(ruleText){
      // intenta encontrar múltiplos/step numérico en el texto
      // ej: "de a 50" / "multiplo de 10" / "múltiplos de 25"
      const t = normLower(ruleText);
      if(!t) return null;

      const m1 = t.match(/(multiplo|múltiplo|multiplos|múltiplos)\s*(de)?\s*(\d+)/i);
      if(m1 && m1[3]) return Number(m1[3]);

      const m2 = t.match(/(de a|por)\s*(\d+)/i);
      if(m2 && m2[2]) return Number(m2[2]);

      return null;
    }

    function validateQty(row, qty){
      const min = row.minimo ?? 1;
      if(qty < min) return {ok:false, msg:`Mínimo ${min} ${row.unidad || ""}`};

      const step = extractStepFromRule(row.regla_cantidad);
      if(step && (qty % step !== 0)){
        return {ok:false, msg:`Debe ser múltiplo de ${step}`};
      }
      return {ok:true, msg:""};
    }

    // =========================================================
    // SELECCIÓN DE FILA (según opciones)
    // =========================================================
    function findBestRow(product, quality, size, color){
      // Busca la fila más específica que matchee lo seleccionado.
      // (si falta algo, intenta tolerar)
      const candidates = product.rows;

      // puntaje por match
      let best = null;
      let bestScore = -1;

      for(const r of candidates){
        let score = 0;

        if(quality && r.calidad === quality) score += 4;
        if(size && r.medida_cm === size) score += 3;
        if(color && r.color === color) score += 5;

        // Si no se seleccionó pero la fila tiene valor, no penalizamos.
        // Pero si se seleccionó y no matchea, penaliza fuerte:
        if(quality && r.calidad && r.calidad !== quality) score -= 10;
        if(size && r.medida_cm && r.medida_cm !== size) score -= 8;
        if(color && r.color && r.color !== color) score -= 12;

        // bonus: fila con precio
        if((r.precio_unitario ?? 0) > 0) score += 1;

        if(score > bestScore){
          bestScore = score;
          best = r;
        }
      }

      return best;
    }

    // =========================================================
    // RENDER: CATEGORÍAS
    // =========================================================
    function renderCategories(){
      const el = document.getElementById("catList");
      el.innerHTML = "";

      for(const cat of categories){
        const btn = document.createElement("button");
        btn.className = "catBtn" + (cat === activeCat ? " active" : "");
        const count = (productsByCat.get(cat) || []).length;
        btn.innerHTML = `<span>${cat}</span><span class="catCount">${count}</span>`;
        btn.onclick = ()=>{
          activeCat = cat;
          renderCategories();
          renderProducts();
        };
        el.appendChild(btn);
      }
    }

    // =========================================================
    // RENDER: PRODUCTOS
    // =========================================================
    function renderProducts(){
      const title = document.getElementById("sectionName");
      const meta = document.getElementById("sectionMeta");
      const container = document.getElementById("cards");
      container.innerHTML = "";

      const listBase = productsByCat.get(activeCat) || [];
      const list = applySearch(listBase, searchTerm);

      title.textContent = activeCat || "Categoría";
      meta.textContent = `${list.length} producto(s)`;

      if(list.length === 0){
        const empty = document.createElement("div");
        empty.style.color = "#6b7280";
        empty.style.padding = "12px 6px";
        empty.textContent = "No hay resultados en esta categoría.";
        container.appendChild(empty);
        return;
      }

      for(const p of list){
        container.appendChild(renderProductCard(p));
      }
    }

    function applySearch(list, term){
      const t = normLower(term);
      if(!t) return list;
      return list.filter(p=>{
        const hay = [
          p.categoria, p.producto, p.descripcion, p.codigo_base
        ].join(" ").toLowerCase();

        // además, buscamos en colores/medidas/calidades
        const extras = [
          p.qualities.join(" "),
          p.sizes.join(" "),
          p.colors.join(" ")
        ].join(" ").toLowerCase();

        return (hay.includes(t) || extras.includes(t));
      });
    }

    function renderProductCard(p){
      // Estado inicial selección
      const defaultQuality = p.qualities[0] || "";
      const defaultSize = p.sizes[0] || "";
      const defaultColor = p.colors[0] || "";

      const card = document.createElement("div");
      card.className = "card";

      // IMG + carousel
      const imgWrap = document.createElement("div");
      imgWrap.className = "imgWrap";

      const img = document.createElement("img");
      img.alt = p.producto;

      let selectedQuality = defaultQuality;
      let selectedSize = defaultSize;
      let selectedColor = defaultColor;

      let imagesList = getImagesForSelection(p, selectedColor);
      let imgIdx = 0;

      function setImageList(newList){
        imagesList = newList && newList.length ? newList : getImagesForSelection(p, selectedColor);
        imgIdx = 0;
        img.src = imagesList[imgIdx];
        renderDots();
        renderCarouselButtons();
      }

      function renderDots(){
        const old = imgWrap.querySelector(".carDots");
        if(old) old.remove();
        if(imagesList.length <= 1) return;

        const dots = document.createElement("div");
        dots.className = "carDots";
        imagesList.forEach((_, i)=>{
          const d = document.createElement("div");
          d.className = "dot" + (i === imgIdx ? " active" : "");
          dots.appendChild(d);
        });
        imgWrap.appendChild(dots);
      }

      function renderCarouselButtons(){
        const old = imgWrap.querySelector(".carouselCtrls");
        if(old) old.remove();
        if(imagesList.length <= 1) return;

        const ctrls = document.createElement("div");
        ctrls.className = "carouselCtrls";

        const prev = document.createElement("button");
        prev.className = "carBtn";
        prev.textContent = "◀";
        prev.onclick = ()=>{
          imgIdx = (imgIdx - 1 + imagesList.length) % imagesList.length;
          img.src = imagesList[imgIdx];
          renderDots();
        };

        const next = document.createElement("button");
        next.className = "carBtn";
        next.textContent = "▶";
        next.onclick = ()=>{
          imgIdx = (imgIdx + 1) % imagesList.length;
          img.src = imagesList[imgIdx];
          renderDots();
        };

        ctrls.appendChild(prev);
        ctrls.appendChild(next);
        imgWrap.appendChild(ctrls);
      }

      img.src = imagesList[0];
      imgWrap.appendChild(img);
      renderDots();
      renderCarouselButtons();

      // BODY
      const body = document.createElement("div");
      body.className = "cardBody";

      const name = document.createElement("p");
      name.className = "pname";
      name.textContent = p.producto;

      const desc = document.createElement("p");
      desc.className = "pdesc";
      desc.textContent = p.descripcion || "";

      body.appendChild(name);
      body.appendChild(desc);

      // Selectores
      const selRow = document.createElement("div");
      selRow.className = "row";

      const qSel = document.createElement("select");
      const sSel = document.createElement("select");
      const cSel = document.createElement("select");

      function fillSelect(sel, values, placeholder){
        sel.innerHTML = "";
        if(values.length === 0){
          const op = document.createElement("option");
          op.value = "";
          op.textContent = placeholder;
          sel.appendChild(op);
          sel.disabled = true;
          return;
        }
        sel.disabled = false;
        values.forEach(v=>{
          const op = document.createElement("option");
          op.value = v;
          op.textContent = v;
          sel.appendChild(op);
        });
      }

      fillSelect(qSel, p.qualities, "Calidad");
      fillSelect(sSel, p.sizes, "Medida");
      fillSelect(cSel, p.colors, "Color");

      // Elegimos defaults si existen
      if(p.qualities.length) qSel.value = defaultQuality;
      if(p.sizes.length) sSel.value = defaultSize;
      if(p.colors.length) cSel.value = defaultColor;

      selRow.appendChild(qSel);
      selRow.appendChild(sSel);
      selRow.appendChild(cSel);
      body.appendChild(selRow);

      // Info price/stock/rules
      const badge = document.createElement("div");
      badge.className = "badgeLine";
      const priceEl = document.createElement("div");
      priceEl.className = "price";
      const stockEl = document.createElement("div");
      stockEl.className = "stock";
      badge.appendChild(priceEl);
      badge.appendChild(stockEl);

      const ruleEl = document.createElement("div");
      ruleEl.className = "rule";

      body.appendChild(badge);
      body.appendChild(ruleEl);

      // Qty + buttons
      const btnRow = document.createElement("div");
      btnRow.className = "btnRow";

      const qty = document.createElement("input");
      qty.type = "number";
      qty.min = "1";
      qty.step = "1";
      qty.value = "1";
      qty.className = "qty";

      const addBtn = document.createElement("button");
      addBtn.className = "btn add";
      addBtn.textContent = "Agregar";

      const cartaBtn = document.createElement("button");
      cartaBtn.className = "btn secondary";
      cartaBtn.textContent = "Carta de colores";
      cartaBtn.style.display = "none";

      btnRow.appendChild(qty);
      btnRow.appendChild(addBtn);
      btnRow.appendChild(cartaBtn);

      body.appendChild(btnRow);

      // Update UI based on selection
      function refresh(){
        selectedQuality = qSel.value || "";
        selectedSize = sSel.value || "";
        selectedColor = cSel.value || "";

        // Row best match
        const row = findBestRow(p, selectedQuality, selectedSize, selectedColor);

        const unit = row?.unidad || "u";
        const min = row?.minimo ?? 1;
        const pr = row?.precio_unitario ?? 0;
        const st = row?.stock_disponible;

        // Ajuste qty mínimo
        if(Number(qty.value) < min) qty.value = String(min);

        // Mostrar precio
        priceEl.textContent = pr ? `$${pr.toLocaleString("es-AR")}` : "Consultar";
        stockEl.textContent = (st === null || st === undefined || st === "") ? "" : `Stock: ${st}`;

        // Reglas
        let ruleParts = [];
        if(min && min > 1) ruleParts.push(`Mínimo: ${min} ${unit}`);
        if(row?.regla_cantidad) ruleParts.push(row.regla_cantidad);
        ruleEl.textContent = ruleParts.join(" · ");

        // Carta colores
        if(p.carta_colores){
          cartaBtn.style.display = "";
          cartaBtn.onclick = ()=> window.open(p.carta_colores, "_blank");
        }else{
          cartaBtn.style.display = "none";
        }

        // Imagen: SOLO cambia si dinamico
        if(p.color_modo === "dinamico"){
          const list = getImagesForSelection(p, selectedColor);
          setImageList(list);
        }else{
          // fijo => deja la base (si no había nada, set)
          if(!imagesList || imagesList.length === 0){
            setImageList(getImagesForSelection(p, selectedColor));
          }
        }

        // Guardamos row actual en el botón para validación/agregado
        addBtn._rowRef = row;
      }

      qSel.onchange = refresh;
      sSel.onchange = refresh;
      cSel.onchange = refresh;

      // Add to cart
      addBtn.onclick = ()=>{
        const row = addBtn._rowRef;
        if(!row){
          toast("No se pudo identificar la variante.");
          return;
        }

        const q = Number(qty.value);
        if(!Number.isFinite(q) || q <= 0){
          toast("Cantidad inválida.");
          return;
        }

        const v = validateQty(row, q);
        if(!v.ok){
          toast(v.msg);
          return;
        }

        // Key carrito por variante exacta
        const key = row._rowKey;

        const unit = row.unidad || "u";
        const unitPrice = row.precio_unitario ?? 0;
        const lineTotal = unitPrice ? (unitPrice * q) : 0;

        const displayName = `${p.producto}${p.codigo_base ? " ("+p.codigo_base+")" : ""}`;
        const metaTxt = [
          row.calidad ? `Calidad: ${row.calidad}` : null,
          row.medida_cm ? `Medida: ${row.medida_cm} cm` : null,
          row.color ? `Color: ${row.color}` : null,
          row.codigo_color ? `Cod color: ${row.codigo_color}` : null,
          unitPrice ? `PU: $${unitPrice.toLocaleString("es-AR")}` : null
        ].filter(Boolean).join(" · ");

        const existing = cart.find(it=> it.key === key);
        if(existing){
          existing.qty += q;
          // recalcular
          existing.lineTotal = existing.unitPrice ? existing.unitPrice * existing.qty : 0;
        }else{
          cart.push({
            key,
            display: displayName,
            meta: metaTxt,
            qty: q,
            unit,
            unitPrice,
            lineTotal,
            rowRef: row
          });
        }

        updateCartUI();
        toast("Agregado al carrito");
      };

      // init refresh
      refresh();

      card.appendChild(imgWrap);
      card.appendChild(body);
      return card;
    }

    // =========================================================
    // CARRITO UI
    // =========================================================
    function openCart(){
      document.getElementById("drawerBg").classList.add("show");
      document.getElementById("drawer").classList.add("show");
    }
    function closeCart(){
      document.getElementById("drawerBg").classList.remove("show");
      document.getElementById("drawer").classList.remove("show");
    }

    function formatMoney(n){
      if(!n) return "$0";
      return "$" + Number(n).toLocaleString("es-AR");
    }

    function updateCartUI(){
      document.getElementById("cartCount").textContent = String(cart.reduce((a,b)=>a+b.qty,0));

      const list = document.getElementById("cartItems");
      list.innerHTML = "";

      if(cart.length === 0){
        const empty = document.createElement("div");
        empty.style.color = "#6b7280";
        empty.style.padding = "10px 0";
        empty.textContent = "Carrito vacío.";
        list.appendChild(empty);
      }

      let total = 0;

      cart.forEach((it, idx)=>{
        total += (it.lineTotal || 0);

        const box = document.createElement("div");
        box.className = "cartItem";

        const left = document.createElement("div");
        left.className = "ciLeft";
        left.innerHTML = `
          <div class="ciTitle">${it.display}</div>
          <div class="ciMeta">${it.meta || ""}</div>
        `;

        const right = document.createElement("div");
        right.className = "ciRight";

        const qty = document.createElement("input");
        qty.type = "number";
        qty.className = "qty";
        qty.value = String(it.qty);
        qty.min = "1";
        qty.step = "1";

        qty.onchange = ()=>{
          const q = Number(qty.value);
          if(!Number.isFinite(q) || q <= 0){
            qty.value = String(it.qty);
            return;
          }

          const v = validateQty(it.rowRef, q);
          if(!v.ok){
            toast(v.msg);
            qty.value = String(it.qty);
            return;
          }

          it.qty = q;
          it.lineTotal = it.unitPrice ? it.unitPrice * it.qty : 0;
          updateCartUI();
        };

        const del = document.createElement("button");
        del.className = "del";
        del.textContent = "Eliminar";
        del.onclick = ()=>{
          cart.splice(idx,1);
          updateCartUI();
        };

        const lt = document.createElement("div");
        lt.style.fontWeight = "800";
        lt.style.marginLeft = "6px";
        lt.textContent = it.unitPrice ? formatMoney(it.lineTotal) : "Consultar";

        right.appendChild(qty);
        right.appendChild(del);
        right.appendChild(lt);

        box.appendChild(left);
        box.appendChild(right);
        list.appendChild(box);
      });

      document.getElementById("totalValue").textContent = formatMoney(total);

      const hint = document.getElementById("waHint");
      hint.textContent = `Se abrirá WhatsApp con el pedido pre-armado para enviar al ${MI_NUMERO}.`;

      const sendBtn = document.getElementById("sendWA");
      sendBtn.disabled = (cart.length === 0);
    }

    function buildWhatsappText(){
      const name = normalize(document.getElementById("clientName").value);
      if(!name) return {ok:false, msg:"Falta el nombre para enviar."};
      if(cart.length === 0) return {ok:false, msg:"Carrito vacío."};

      let lines = [];
      lines.push(`Hola! Soy *${name}*.`);
      lines.push(`Quiero hacer este pedido:`);
      lines.push("");

      cart.forEach((it, i)=>{
        const r = it.rowRef;
        const parts = [];
        parts.push(`• *${it.display}*`);
        if(r.calidad) parts.push(`  - Calidad: ${r.calidad}`);
        if(r.medida_cm) parts.push(`  - Medida: ${r.medida_cm} cm`);
        if(r.color) parts.push(`  - Color: ${r.color}`);
        if(r.codigo_color) parts.push(`  - Código color: ${r.codigo_color}`);
        parts.push(`  - Cantidad: ${it.qty} ${r.unidad || "u"}`);
        if(it.unitPrice) parts.push(`  - Precio unit.: $${it.unitPrice.toLocaleString("es-AR")}`);
        lines.push(parts.join("\n"));
        lines.push("");
      });

      lines.push("Gracias!");
      return {ok:true, text: lines.join("\n")};
    }

    function sendWhatsapp(){
      const built = buildWhatsappText();
      if(!built.ok){
        toast(built.msg);
        return;
      }

      const msg = encodeURIComponent(built.text);
      const url = `https://wa.me/${MI_NUMERO}?text=${msg}`;
      window.open(url, "_blank");
    }

    // =========================================================
    // INIT
    // =========================================================
    async function init(){
      try{
        const all = await loadCSV(SHEET_CSV_URL);
        const built = buildProductsFromRows(all);
        rows = built.normRows;
        products = built.products;

        const idx = buildCategoryIndex(products);
        categories = idx.cats;
        productsByCat = idx.catMap;

        activeCat = categories[0] || null;

        renderCategories();
        renderProducts();
        updateCartUI();

      }catch(e){
        console.error(e);
        document.getElementById("sectionName").textContent = "Error cargando catálogo";
        document.getElementById("sectionMeta").textContent = "Revisá que el CSV esté publicado y accesible.";
        const cards = document.getElementById("cards");
        cards.innerHTML = `<div style="color:#6b7280;padding:12px 6px;">${String(e.message || e)}</div>`;
      }
    }

    document.getElementById("searchInput").addEventListener("input", (ev)=>{
      searchTerm = ev.target.value || "";
      renderProducts();
    });

    document.getElementById("openCart").onclick = openCart;
    document.getElementById("closeCart").onclick = closeCart;
    document.getElementById("drawerBg").onclick = closeCart;

    document.getElementById("sendWA").onclick = sendWhatsapp;

    init();
  </script>
</body>
</html>
